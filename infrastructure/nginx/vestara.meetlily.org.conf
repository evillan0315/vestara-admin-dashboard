# ─────────────────────────────────────────────────────────────────────────────
# Vestara Admin Dashboard — Nginx site configuration (single-domain)
# ─────────────────────────────────────────────────────────────────────────────
# Domain : vestara.meetlily.org
# Topology:
#   - Nginx serves the built SPA (React/Vite) at `/` from /var/www/vestara
#   - Reverse-proxies the Express API at `/api/v1/*` → 127.0.0.1:5000
#   - Upgrades WebSocket traffic on `/api/v1/ws` (and `/socket.io/`)
#   - Allows large uploads (files endpoint) up to 100 MB
#
# Install:
#   sudo cp vestara.meetlily.org.conf /etc/nginx/sites-available/vestara
#   sudo ln -sf /etc/nginx/sites-available/vestara /etc/nginx/sites-enabled/vestara
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# TLS: run `sudo certbot --nginx -d vestara.meetlily.org` after the site is
# enabled — Certbot will inject the `listen 443 ssl;` block, certificate paths,
# and the HTTPS redirect automatically.
# ─────────────────────────────────────────────────────────────────────────────

# HTTP → HTTPS redirect (Certbot manages the 443 server block after issuance).
server {
    listen 80;
    listen [::]:80;
    server_name vestara.meetlily.org;

    # Allow Certbot's ACME challenge to pass through unproxied.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server (TLS lines are added by Certbot; kept here for reference).
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name vestara.meetlily.org;

    # Certbot injects these after `certbot --nginx`:
    # ssl_certificate     /etc/letsencrypt/live/vestara.meetlily.org/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/vestara.meetlily.org/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Modern TLS hardening (applied once certificates are present).
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Security headers (complement Helmet on the API; apply at edge too).
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; connect-src 'self' https: wss:; frame-ancestors 'none'" always;

    access_log /var/log/nginx/vestara.access.log;
    error_log  /var/log/nginx/vestara.error.log;

    # ── API backend (/api/v1/*) ───────────────────────────────
    location /api/v1/ {
        client_max_body_size 100M;          # allow large uploads (files, avatars)

        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;

        # WebSocket support (/api/v1/ws)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ── Real-time Socket.IO layer ────────────────────────────
    location /socket.io/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 86400s;          # keep long-lived sockets alive
    }

    # ── Static SPA (built by `pnpm --filter web build`) ───────
    location / {
        root /var/www/vestara;
        index index.html;
        try_files $uri $uri/ /index.html;   # SPA fallback for client-side routing

        # Cache immutable hashed assets aggressively; revalidate index.html.
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }
    }
}
