name: Deploy Web (Self-Hosted SSH)

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - 'turbo.json'
      - 'package.json'
      - 'scripts/deploy.sh'
      - 'deploy.env.example'
  workflow_dispatch:
    inputs:
      api:
        description: 'Also deploy/restart the API on the remote server'
        required: false
        default: false
        type: boolean

jobs:
  deploy-web:
    name: Build & Deploy Web over SSH
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web app
        run: pnpm --filter web build

      - name: Write SSH private key
        run: |
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > "$HOME/deploy_key"
          chmod 600 "$HOME/deploy_key"

      - name: Deploy via SSH (public-key auth)
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ env.HOME }}/deploy_key
          DEPLOY_WEB_PATH: ${{ secrets.DEPLOY_WEB_PATH }}
          DEPLOY_API: ${{ github.event.inputs.api || 'false' }}
        run: bash scripts/deploy.sh --no-build

      - name: Remove SSH key from runner
        if: always()
        run: rm -f "$HOME/deploy_key"
