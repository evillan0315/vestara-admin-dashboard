name: Sync Subscribers

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify tsx exists
        run: npx tsx --version
      
      - name: Debug env
        run: |
            echo "BASE=$EXTERNAL_API_BASE"
            echo "TOKEN=$EXTERNAL_API_TOKEN"

      - name: Run sync
        run: npx tsx src/scripts/sync-subscribers.ts
        env:
          EXTERNAL_API_BASE: ${{ secrets.EXTERNAL_API_BASE }}
          EXTERNAL_API_TOKEN: ${{ secrets.EXTERNAL_API_TOKEN }}
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}